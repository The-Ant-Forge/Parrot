<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="manifest.open_in_tab" content="true" />
    <title>Parrot Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Parrot Settings</h1>
      </header>

      <main>
        <!-- Plex Server -->
        <section class="card">
          <h2>Plex Server</h2>

          <label for="serverUrl">Server URL</label>
          <input
            type="text"
            id="serverUrl"
            placeholder="http://192.168.1.100:32400"
            spellcheck="false"
          />

          <label for="token">Plex Token</label>
          <input type="password" id="token" placeholder="Your Plex token" />

          <div class="button-row">
            <button id="testBtn">Test Connection</button>
            <button id="saveBtn" class="primary">Save &amp; Sync</button>
          </div>

          <div id="plexFeedback" class="feedback" hidden></div>

          <div id="plexStatus" class="status-block" hidden>
            <div class="status-row">
              <span>Library items:</span>
              <span id="itemCount">—</span>
            </div>
            <div class="status-row">
              <span>Last synced:</span>
              <span id="lastSync">—</span>
            </div>
          </div>
        </section>

        <!-- API Keys -->
        <section class="card">
          <h2>API Keys</h2>

          <label for="tmdbApiKey">TMDB API Key</label>
          <div class="input-with-button">
            <input
              type="password"
              id="tmdbApiKey"
              placeholder="Your TMDB v3 API key"
              spellcheck="false"
            />
            <button id="validateTmdbBtn">Validate</button>
          </div>
          <div id="tmdbFeedback" class="feedback" hidden></div>
          <p class="hint">
            Get a free API key at
            <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">
              themoviedb.org/settings/api</a>.
          </p>
        </section>

        <!-- Gap Detection Options -->
        <section class="card">
          <h2>Gap Detection</h2>

          <div class="toggle-row">
            <label for="excludeFuture">Exclude future/unreleased movies</label>
            <input type="checkbox" id="excludeFuture" />
          </div>

          <div class="toggle-row">
            <label for="excludeSpecials">Exclude specials (Season 0)</label>
            <input type="checkbox" id="excludeSpecials" />
          </div>

          <div class="number-row">
            <label for="minCollectionSize">Minimum collection size</label>
            <input type="number" id="minCollectionSize" min="2" max="50" />
          </div>

          <div class="number-row">
            <label for="minOwned">Minimum owned to show gaps</label>
            <input type="number" id="minOwned" min="1" max="50" />
          </div>

          <button id="saveOptionsBtn" class="primary">Save Options</button>
          <div id="optionsFeedback" class="feedback" hidden></div>
        </section>

        <!-- Cache Management -->
        <section class="card">
          <h2>Cache</h2>

          <div id="cacheStatus" class="status-block">
            <div class="status-row">
              <span>Library index:</span>
              <span id="cacheItemCount">—</span>
            </div>
            <div class="status-row">
              <span>Last synced:</span>
              <span id="cacheLastSync">—</span>
            </div>
          </div>

          <div class="button-row">
            <button id="refreshBtn">Refresh Library</button>
            <button id="clearCacheBtn" class="danger">Clear All Cache</button>
          </div>
          <div id="cacheFeedback" class="feedback" hidden></div>
        </section>
      </main>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
